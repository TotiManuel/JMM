{% extends 'base.html' %}

{% block content %}

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#6a11cb,#2575fc);
    margin:0;
    min-height:100vh;
}

/* Contenedor principal */
.container-dashboard{
    max-width:700px;
    margin:60px auto;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.5s ease;
}

/* Titulos */
h2{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

/* Formulario */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-bottom:40px;
}

input, textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
}

textarea{
    resize:vertical;
    min-height:80px;
}

/* Botón principal */
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1e4ed8;
}

/* Cards de módulos */
.card{
    background:#f9f9f9;
    padding:20px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
    margin-top:0;
    color:#2563eb;
}

.card p{
    color:#555;
}

/* Links de acciones */
.card a{
    display:inline-block;
    margin-right:10px;
    margin-top:10px;
    padding:8px 12px;
    border-radius:6px;
    text-decoration:none;
    font-size:14px;
    background:#2563eb;
    color:white;
}

.card a:last-child{
    background:#ef4444;
}

/* Animación */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
<div class="container-dashboard">
<h2>Crear módulo</h2>

<form method="POST" action="{{ url_for('dashboard.crear_modulo') }}">

    <input type="text" name="nombre" placeholder="Nombre del módulo" required>

    <input type="text" name="codigo" placeholder="Codigo (sin espacios)" required>

    <textarea name="descripcion" placeholder="Descripción"></textarea>

    <button type="submit">Crear módulo</button>

</form>

<h2>Módulos</h2>
<p>Total modulos: {{ modulos|length }}</p>

{% for modulo in modulos %}

<div class="card">

<h3>{{ modulo.nombre }}</h3>

<p>{{ modulo.descripcion }}</p>

<a href="/modulo/{{ modulo.codigo }}">Abrir</a>

<a href="/dashboard/eliminar_modulo/{{ modulo.id }}">Eliminar</a>

</div>

{% endfor %}
</div>
{% endblock %}
