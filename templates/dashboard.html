{% extends 'base.html' %}

{% block content %}
<style>

/* ================= BACKGROUND ================= */

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1a1a1a, #000000 80%);
    margin: 0;
    min-height: 100vh;
    color: #f5f5f5;
}

/* ================= CONTENEDOR ================= */

.container-dashboard {
    max-width: 750px;
    margin: 70px auto;
    background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
    padding: 40px;
    border-radius: 18px;
    box-shadow: 
        0 20px 50px rgba(0,0,0,0.9),
        inset 0 0 15px rgba(255,255,255,0.05);
    animation: fadeIn 0.6s ease;
    position: relative;
    overflow: hidden;
}

/* brillo animado */
.container-dashboard::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(255,255,255,0.05), transparent 60%);
    animation: glowMove 8s linear infinite;
}

/* ================= TITULOS ================= */

h2 {
    text-align: center;
    color: #ffffff;
    margin-bottom: 20px;
    text-shadow: 0 0 10px rgba(255,255,255,0.15);
}

p {
    text-align: center;
    color: #aaaaaa;
}

/* ================= FORMULARIO ================= */

form {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-bottom: 40px;
}

input, textarea {
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    background: #0d0d0d;
    color: #fff;
    transition: all 0.3s ease;
}

input::placeholder,
textarea::placeholder {
    color: #777;
}

input:focus,
textarea:focus {
    outline: none;
    border-color: #ffffff;
    box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

textarea {
    resize: vertical;
    min-height: 90px;
}

/* ================= BOTÓN ================= */

button {
    background: linear-gradient(90deg, #ffffff, #cccccc);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 10px 25px rgba(255,255,255,0.25);
}

/* ================= CARDS ================= */

.card {
    background: linear-gradient(145deg, #111, #1c1c1c);
    padding: 20px;
    border-radius: 14px;
    margin-bottom: 15px;
    box-shadow: 
        0 8px 20px rgba(0,0,0,0.8),
        inset 0 0 10px rgba(255,255,255,0.04);
    transition: 0.3s ease;
    position: relative;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 
        0 15px 30px rgba(0,0,0,0.9),
        inset 0 0 12px rgba(255,255,255,0.06);
}

.card h3 {
    margin-top: 0;
    color: #ffffff;
}

.card p {
    color: #bbbbbb;
    text-align: left;
}

/* ================= LINKS ================= */

.card a {
    display: inline-block;
    margin-right: 10px;
    margin-top: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
    background: linear-gradient(90deg, #ffffff, #cccccc);
    color: #000;
    transition: 0.3s;
}

.card a:last-child {
    background: linear-gradient(90deg, #ff4d4d, #cc0000);
    color: #fff;
}

.card a:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(255,255,255,0.2);
}

/* ================= ANIMACIONES ================= */

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes glowMove {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

/* ================= RESPONSIVE ================= */

@media (max-width: 600px) {
    .container-dashboard {
        margin: 40px 15px;
        padding: 25px 20px;
    }
}

</style>

<div class="container-dashboard">
<h2>Crear módulo</h2>

<form method="POST" action="{{ url_for('dashboard.crear_modulo') }}">

    <input type="text" name="nombre" placeholder="Nombre del módulo" required>

    <input type="text" name="codigo" placeholder="Codigo (sin espacios)" required>

    <textarea name="descripcion" placeholder="Descripción"></textarea>

    <button type="submit">Crear módulo</button>

</form>

<h2>Módulos</h2>
<p>Total modulos: {{ modulos|length }}</p>

{% for modulo in modulos %}

<div class="card">

<h3>{{ modulo.nombre }}</h3>

<p>{{ modulo.descripcion }}</p>

<a href="/modulo/{{ modulo.codigo }}">Abrir</a>

<a href="/dashboard/eliminar_modulo/{{ modulo.id }}">Eliminar</a>

</div>

{% endfor %}
</div>
{% endblock %}
