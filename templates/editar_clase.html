{% extends "base.html" %}

{% block content %}

<h1>Editar Clase</h1>

<form method="POST">

<label>Título</label>
<br>
<input type="text" name="titulo" value="{{ clase.titulo }}" required>
<br><br>

<label>Descripción</label>
<br>
<textarea name="descripcion" rows="4">{{ clase.descripcion }}</textarea>
<br><br>

<button type="submit">Guardar cambios</button>

<a href="{{ url_for('ver_clase', id=clase.id) }}">
<button type="button">Ver clase</button>
</a>

<a href="{{ url_for('eliminar_clase', id=clase.id) }}">
<button type="button">Eliminar</button>
</a>

</form>

{% endblock %}
