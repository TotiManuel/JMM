{% extends "base.html" %}

{% block content %}

<h1>Editar Clase</h1>

<form method="POST">

<label>Título</label><br>
<input type="text" name="titulo" value="{{ clase.titulo }}" required>

<br><br>

<label>Descripción</label><br>
<textarea name="descripcion">{{ clase.descripcion }}</textarea>

<br><br>

<button type="submit">Guardar</button>

</form>

<hr>

<h2>Bloques</h2>

<form method="POST" action="/clases/{{ clase.id }}/bloque">

<select name="tipo">
<option value="texto">Texto</option>
<option value="imagen">Imagen</option>
<option value="video">Video</option>
</select>

<br><br>

<textarea name="contenido"></textarea>

<br><br>

<button type="submit">Agregar bloque</button>

</form>

<hr>

{% for bloque in bloques %}

<div style="border:1px solid #ccc; padding:10px; margin-bottom:10px">

<strong>{{ bloque.tipo }}</strong>

<p>{{ bloque.contenido }}</p>

</div>

{% endfor %}

{% endblock %}
