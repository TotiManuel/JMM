{% extends "base.html" %}

{% block content %}

<style>

body{
background: linear-gradient(135deg,#6a11cb,#2575fc);
font-family: Arial, sans-serif;
}

/* contenedor visual del formulario */

form{
max-width:600px;
margin:90px auto;
background:white;
padding:40px 30px;
border-radius:18px;
box-shadow:0 12px 35px rgba(0,0,0,0.2);
animation:fadeIn 0.8s ease;
}

/* título */

h1{
text-align:center;
color:#333;
margin-top:40px;
}

/* labels */

label{
font-weight:500;
color:#333;
}

/* inputs */

input, textarea{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
margin-top:6px;
outline:none;
transition:0.2s;
}

input:focus, textarea:focus{
border-color:#2575fc;
box-shadow:0 0 0 2px rgba(37,117,252,0.15);
}

/* botón */

button{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#2575fc;
color:white;
border:none;
border-radius:10px;
font-weight:500;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1b5edb;
transform:translateY(-2px);
}

/* animación */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive */

@media (max-width:600px){

form{
margin:40px 15px;
padding:30px 20px;
}

h1{
font-size:22px;
}

}

</style>

<h1>Nueva Clase</h1>

<form method="POST">

<label>Título</label>
<br>
<input type="text" name="titulo" required>
<br><br>

<label>Descripción</label>
<br>
<textarea name="descripcion" rows="4"></textarea>
<br><br>

<button type="submit">Crear clase</button>

</form>

{% endblock %}
