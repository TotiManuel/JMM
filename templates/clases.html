{% extends 'base.html' %}

{% block content %}
<style>

body{
background: linear-gradient(135deg,#6a11cb,#2575fc);
font-family: Arial, sans-serif;
}

/* contenedor principal */

.clases-container{
max-width:1000px;
margin:80px auto;
background:white;
padding:40px 35px;
border-radius:18px;
box-shadow:0 12px 35px rgba(0,0,0,0.2);
animation:fadeIn 0.8s ease;
}

/* header */

.header-clases{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.header-clases h1{
color:#333;
}

/* botón */

.btn-nueva{
display:inline-block;
padding:10px 20px;
background:#2575fc;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:500;
transition:0.3s;
}

.btn-nueva:hover{
background:#1b5edb;
transform:translateY(-2px);
}

/* buscador */

.buscador{
margin:20px 0 30px 0;
}

.buscador input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
outline:none;
}

.buscador input:focus{
border-color:#2575fc;
}

/* grid */

.grid-clases{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* cards */

.card-clase{
background:#f9f9f9;
padding:20px;
border-radius:14px;
cursor:pointer;
transition:0.25s;
border:1px solid #eee;
}

.card-clase:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card-clase h3{
margin-bottom:8px;
color:#2575fc;
}

.card-clase p{
color:#555;
font-size:14px;
margin-bottom:10px;
}

/* footer */

.card-footer{
font-size:12px;
color:#888;
}

/* sin clases */

.sin-clases{
text-align:center;
margin-top:30px;
color:#777;
}

/* animación */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(25px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* responsive */

@media(max-width:600px){

.clases-container{
margin:40px 15px;
padding:30px 20px;
}

.header-clases{
flex-direction:column;
align-items:flex-start;
}

}

</style>

<div class="clases-container">

<div class="header-clases">

<h1>Clases de Enfermería</h1>

<a href="{{ url_for('clases.nueva_clase') }}" class="btn-nueva">
➕ Nueva Clase
</a>

</div>


<div class="buscador">
<input type="text" id="buscarClase" placeholder="Buscar clase...">
</div>


<div class="grid-clases" id="gridClases">

{% for clase in clases %}

<div class="card-clase"
data-titulo="{{ clase.titulo|lower }}"
onclick="abrirClase({{ clase.id }})">

<h3>{{ clase.titulo }}</h3>

<p>{{ clase.descripcion }}</p>

<div class="card-footer">

📅 {{ clase.fecha.strftime('%d/%m/%Y') }}

</div>

</div>

{% endfor %}

</div>

{% if clases|length == 0 %}

<div class="sin-clases">
<p>No hay clases todavía</p>
</div>

{% endif %}

</div>

 
<script>

function abrirClase(id){
    onclick="window.open('{{ url_for('clases.ver_clase', id=clase.id) }}')"
}

const buscador = document.getElementById("buscarClase")
const tarjetas = document.querySelectorAll(".card-clase")

buscador.addEventListener("input", function(){

    let texto = buscador.value.toLowerCase().trim()

    let palabras = texto.split(" ").filter(p => p.length > 0)

    tarjetas.forEach(card => {

        let titulo = card.dataset.titulo.toLowerCase()

        let coincide = palabras.every(p => titulo.includes(p))

        if(coincide){
            card.style.display = "block"
        }else{
            card.style.display = "none"
        }

    })

})

</script>

{% endblock %}
