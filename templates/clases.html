{% extends 'base.html' %}

{% block content %}
<style>
.grid-clases{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:20px;
}

.card-clase{
background:white;
padding:20px;
border-radius:10px;
cursor:pointer;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
}

.card-clase:hover{
transform:scale(1.03);
}
</style>
<h1>Clases de Enfermería</h1>

<a href="{{ url_for('nueva_clase') }}" class="btn">Agregar Clase</a>

<div class="grid-clases">

{% for clase in clases %}

<div class="card-clase" onclick="window.open('{{ url_for('ver_clase', id=clase.id) }}','_blank')">

<h3>{{ clase.titulo }}</h3>

<p>{{ clase.descripcion }}</p>

</div>

{% endfor %}

</div>

{% endblock %}
