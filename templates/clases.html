{% extends 'base.html' %}

{% block content %}

<style>

.clases-container{
max-width:1100px;
margin:40px auto;
}

.header-clases{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.btn-nueva{
background:#2563eb;
color:white;
padding:10px 16px;
border-radius:6px;
text-decoration:none;
font-size:14px;
}

.btn-nueva:hover{
background:#1e4fd1;
}

.buscador{
margin-top:20px;
margin-bottom:20px;
}

.buscador input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

.grid-clases{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card-clase{
background:white;
padding:20px;
border-radius:12px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
transition:all 0.25s ease;
position:relative;
overflow:hidden;
}

.card-clase:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card-clase h3{
margin-bottom:10px;
color:#2563eb;
}

.card-clase p{
color:#555;
font-size:14px;
}

.card-footer{
margin-top:15px;
font-size:12px;
color:#888;
}

.sin-clases{
text-align:center;
margin-top:40px;
color:#777;
}

</style>


<div class="clases-container">

<div class="header-clases">

<h1>Clases de Enfermería</h1>

<a href="{{ url_for('nueva_clase') }}" class="btn-nueva">
➕ Nueva Clase
</a>

</div>


<div class="buscador">
<input type="text" id="buscarClase" placeholder="Buscar clase...">
</div>


<div class="grid-clases" id="gridClases">

{% for clase in clases %}

<div class="card-clase"
data-titulo="{{ clase.titulo|lower }}"
onclick="abrirClase({{ clase.id }})">

<h3>{{ clase.titulo }}</h3>

<p>{{ clase.descripcion }}</p>

<div class="card-footer">

📅 {{ clase.fecha.strftime('%d/%m/%Y') }}

</div>

</div>

{% endfor %}

</div>

{% if clases|length == 0 %}

<div class="sin-clases">
<p>No hay clases todavía</p>
</div>

{% endif %}

</div>


<script>

function abrirClase(id){
    window.open("/clases/" + id, "_blank")
}

const buscador = document.getElementById("buscarClase")
const tarjetas = document.querySelectorAll(".card-clase")

buscador.addEventListener("input", function(){

    let texto = buscador.value.toLowerCase().trim()

    let palabras = texto.split(" ").filter(p => p.length > 0)

    tarjetas.forEach(card => {

        let titulo = card.dataset.titulo.toLowerCase()

        let coincide = palabras.every(p => titulo.includes(p))

        if(coincide){
            card.style.display = "block"
        }else{
            card.style.display = "none"
        }

    })

})

</script>

{% endblock %}
