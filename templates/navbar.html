<style>
nav {
    width: 100%;
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    padding: 12px 25px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* Links container */
.nav-links {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
}

/* Links */
nav a {
    color: white;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    position: relative;
    transition: 0.3s ease;
}

/* Hover underline */
nav a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -4px;
    width: 0%;
    height: 2px;
    background: white;
    transition: 0.3s;
    border-radius: 2px;
}

nav a:hover::after {
    width: 100%;
}

/* Usuario */
.user-badge {
    background: rgba(255,255,255,0.2);
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 13px;
}

/* Responsive */
@media (max-width: 600px) {
    nav {
        justify-content: center;
        padding: 12px 10px;
    }

    .nav-links {
        justify-content: center;
        gap: 12px;
    }
}
</style>

<nav>
    <div class="nav-links">

        <a href="{{ url_for('main.home') }}">Home</a>

        {% if session.get('user') %}

            <span class="user-badge">
                👤 {{ session.get('user') }}
            </span>

            <a href="{{ url_for('dashboard.dashboard_view') }}">Dashboard</a>

            {% for modulo in modulos_navbar %}
                <a href="{{ url_for('modulos.ver_modulo', codigo=modulo.codigo) }}">
                    {{ modulo.nombre }}
                </a>
            {% endfor %}

            <a href="{{ url_for('auth.logout') }}">Logout</a>

        {% else %}

            <!-- 👇 CORREGIDO -->
            <a href="{{ url_for('auth.auth_page') }}">Login</a>

        {% endif %}

    </div>
</nav>
