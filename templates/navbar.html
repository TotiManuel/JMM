<style>

/* ================= NAV BASE ================= */

nav {
    width: 100%;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a, #000000);
    padding: 14px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    box-shadow: 0 6px 25px rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    animation: fadeNav 0.6s ease;
}

/* ================= LINKS CONTAINER ================= */

.nav-links {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
}

/* ================= LINKS ================= */

nav a {
    color: #f5f5f5;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    position: relative;
    padding: 4px 0;
    transition: all 0.3s ease;
}

/* Glow + underline animado */
nav a::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, #ffffff, #aaaaaa);
    transition: 0.3s ease;
    border-radius: 2px;
    transform: translateX(-50%);
}

nav a:hover {
    color: #ffffff;
    text-shadow: 0 0 8px rgba(255,255,255,0.6);
}

nav a:hover::after {
    width: 100%;
}

/* ================= USER BADGE ================= */

.user-badge {
    background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: inset 0 0 10px rgba(255,255,255,0.05);
    animation: glowUser 2s infinite alternate;
}

/* ================= ANIMACIONES ================= */

@keyframes fadeNav {
    from {
        opacity: 0;
        transform: translateY(-15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes glowUser {
    from {
        box-shadow: 0 0 5px rgba(255,255,255,0.1);
    }
    to {
        box-shadow: 0 0 12px rgba(255,255,255,0.3);
    }
}

/* ================= RESPONSIVE ================= */

@media (max-width: 600px) {
    nav {
        justify-content: center;
        padding: 12px 10px;
    }

    .nav-links {
        justify-content: center;
        gap: 12px;
    }
}

</style>

<nav>
    <div class="nav-links">

        {% if session.get('user') %}

            <a href="{{ url_for('main.home') }}">
                <span class="user-badge">
                👤 {{ session.get('user') }}
            </span>
            </a>

            <a href="{{ url_for('dashboard.dashboard_view') }}">Dashboard</a>

            {% for modulo in modulos_navbar %}
                <a href="{{ url_for('modulos.ver_modulo', codigo=modulo.codigo) }}">
                    {{ modulo.nombre }}
                </a>
            {% endfor %}

            <a href="{{ url_for('auth.logout') }}">Logout</a>

        {% else %}

            <!-- 👇 CORREGIDO -->
            <a href="{{ url_for('main.home') }}">Home</a>
            <a href="{{ url_for('auth.auth_page') }}">Login</a>

        {% endif %}

    </div>
</nav>
